<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Walk-in Interview Platform</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">🎯</div>
      <h1>Walk-in Interviews</h1>
      <p>Book your dream job interview</p>
    </div>

    <!-- Tabs: Login / Register -->
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Log In</button>
      <button class="auth-tab"        onclick="switchTab('register')">Register</button>
    </div>

    <!-- Alert area -->
    <div id="auth-alert"></div>

    <!-- ── Login Form ────────────────────────────────────────── -->
    <form id="login-form" class="auth-form active" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="login-email">Email Address</label>
        <input class="form-control" type="email" id="login-email"
               placeholder="you@email.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <div class="password-toggle">
          <input class="form-control" type="password" id="login-password"
                 placeholder="••••••••" required autocomplete="current-password">
          <button type="button" class="toggle-pw-btn" onclick="togglePassword('login-password', this)">👁</button>
        </div>
      </div>

      <div style="text-align:right; margin-bottom:20px;">
        <a href="#" onclick="showForgotPassword()" style="font-size:0.85rem;">
          Forgot password?
        </a>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">
        Log In
      </button>
    </form>

    <!-- ── Register Form ─────────────────────────────────────── -->
    <form id="register-form" class="auth-form" onsubmit="handleRegister(event)">

      <!-- Role selector -->
      <div class="role-selector">
        <div class="role-option selected" data-role="user" onclick="selectRole('user', this)">
          <div class="role-icon">👤</div>
          <div class="role-label">Job Seeker</div>
        </div>
        <div class="role-option" data-role="company" onclick="selectRole('company', this)">
          <div class="role-icon">🏢</div>
          <div class="role-label">Company</div>
        </div>
      </div>

      <input type="hidden" id="selected-role" value="user">

      <!-- User fields -->
      <div id="user-fields">
        <div class="form-group">
          <label class="form-label">Full Name <span>*</span></label>
          <input class="form-control" type="text" id="reg-name"
                 placeholder="Your full name" autocomplete="name">
        </div>
      </div>

      <!-- Company fields (hidden by default) -->
      <div id="company-fields" class="hidden">
        <div class="form-group">
          <label class="form-label">Company Name <span>*</span></label>
          <input class="form-control" type="text" id="reg-company-name"
                 placeholder="Acme Corp">
        </div>
        <div class="form-group">
          <label class="form-label">Industry</label>
          <input class="form-control" type="text" id="reg-industry"
                 placeholder="e.g. Information Technology">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email Address <span>*</span></label>
        <input class="form-control" type="email" id="reg-email"
               placeholder="you@email.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label">Password <span>*</span></label>
        <div class="password-toggle">
          <input class="form-control" type="password" id="reg-password"
                 placeholder="Min 8 characters" required autocomplete="new-password">
          <button type="button" class="toggle-pw-btn"
                  onclick="togglePassword('reg-password', this)">👁</button>
        </div>
        <p class="form-hint">Must be at least 8 characters.</p>
      </div>

      <div class="form-group" id="phone-group">
        <label class="form-label">Phone Number</label>
        <input class="form-control" type="tel" id="reg-phone"
               placeholder="+91 9876543210">
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" id="register-btn">
        Create Account
      </button>
    </form>

    <!-- ── Verify Email Form (shown after registration) ──────── -->
    <form id="verify-form" class="auth-form" onsubmit="handleVerify(event)">
      <div style="text-align:center; margin-bottom:24px;">
        <div style="font-size:3rem; margin-bottom:12px;">📧</div>
        <h3>Check your email</h3>
        <p class="text-muted" id="verify-msg">
          We sent a 6-digit code to your email.
        </p>
      </div>

      <div class="form-group">
        <label class="form-label">Verification Code</label>
        <input class="form-control" type="text" id="verify-code"
               placeholder="Enter 6-digit code" maxlength="6"
               style="text-align:center; font-size:1.5rem; letter-spacing:0.3em;">
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg">
        Verify Email
      </button>

      <p class="auth-footer">
        <a href="#" onclick="resendCode()">Resend code</a>
      </p>
    </form>

    <!-- ── Forgot Password Form ──────────────────────────────── -->
    <form id="forgot-form" class="auth-form" onsubmit="handleForgotPassword(event)">
      <div style="text-align:center; margin-bottom:24px;">
        <div style="font-size:3rem; margin-bottom:12px;">🔑</div>
        <h3>Reset Password</h3>
        <p class="text-muted">Enter your email and we'll send a reset code.</p>
      </div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-control" type="email" id="forgot-email" placeholder="you@email.com">
      </div>

      <button type="submit" class="btn btn-primary btn-full">Send Reset Code</button>

      <p class="auth-footer mt-2">
        <a href="#" onclick="switchTab('login')">← Back to Login</a>
      </p>
    </form>

  </div><!-- /.auth-card -->
</div><!-- /.auth-page -->

<div id="toast-container"></div>

<script src="../js/auth.js"></script>
<script src="../js/api.js"></script>
<script>
  // Redirect if already logged in
  if (Auth.isLoggedIn()) {
    window.location.href = Auth.isCompany()
      ? '../pages/company-dashboard.html'
      : '../pages/user-dashboard.html';
  }

  let pendingEmail = '';

  // ── Tab Switching ──────────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.auth-tab, .auth-form').forEach(el => {
      el.classList.remove('active');
    });
    document.querySelectorAll('.auth-tab')[tab === 'login' ? 0 : 1]
      .classList.add('active');
    document.getElementById(tab + '-form').classList.add('active');
    clearAlert();
  }

  function showForgotPassword() {
    document.querySelectorAll('.auth-tab, .auth-form').forEach(el => el.classList.remove('active'));
    document.getElementById('forgot-form').classList.add('active');
  }

  // ── Role Selection ─────────────────────────────────────────────
  function selectRole(role, el) {
    document.querySelectorAll('.role-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('selected-role').value = role;

    if (role === 'company') {
      document.getElementById('user-fields').classList.add('hidden');
      document.getElementById('company-fields').classList.remove('hidden');
      document.getElementById('phone-group').classList.add('hidden');
    } else {
      document.getElementById('user-fields').classList.remove('hidden');
      document.getElementById('company-fields').classList.add('hidden');
      document.getElementById('phone-group').classList.remove('hidden');
    }
  }

  // ── Password Visibility Toggle ─────────────────────────────────
  function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
    else                           { input.type = 'password'; btn.textContent = '👁'; }
  }

  // ── Alerts ─────────────────────────────────────────────────────
  function showAlert(msg, type = 'danger') {
    document.getElementById('auth-alert').innerHTML =
      `<div class="alert alert-${type}">${msg}</div>`;
  }

  function clearAlert() {
    document.getElementById('auth-alert').innerHTML = '';
  }

  // ── Login ──────────────────────────────────────────────────────
  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    setLoading(btn, true, 'Logging in...');
    clearAlert();

    try {
      const res = await api.auth.login({
        email:    document.getElementById('login-email').value.trim(),
        password: document.getElementById('login-password').value,
      });

      Auth.saveSession(res.data, res.data.profile);
      Toast.success('Welcome back!');

      setTimeout(() => {
        window.location.href = Auth.isCompany()
          ? '../pages/company-dashboard.html'
          : '../pages/user-dashboard.html';
      }, 400);
    } catch (err) {
      showAlert(err.message || 'Login failed. Please try again.');
      setLoading(btn, false);
    }
  }

  // ── Register ───────────────────────────────────────────────────
  async function handleRegister(e) {
    e.preventDefault();
    const btn  = document.getElementById('register-btn');
    const role = document.getElementById('selected-role').value;
    setLoading(btn, true, 'Creating account...');
    clearAlert();

    try {
      const email = document.getElementById('reg-email').value.trim();
      pendingEmail = email;

      if (role === 'company') {
        await api.auth.registerCompany({
          email:        email,
          password:     document.getElementById('reg-password').value,
          company_name: document.getElementById('reg-company-name').value.trim(),
          industry:     document.getElementById('reg-industry').value.trim(),
        });
      } else {
        await api.auth.registerUser({
          email:     email,
          password:  document.getElementById('reg-password').value,
          full_name: document.getElementById('reg-name').value.trim(),
          phone:     document.getElementById('reg-phone').value.trim() || undefined,
        });
      }

      // Show verification form
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      document.getElementById('verify-form').classList.add('active');
      document.getElementById('verify-msg').textContent =
        `We sent a 6-digit code to ${email}`;

    } catch (err) {
      showAlert(err.message || 'Registration failed.');
    } finally {
      setLoading(btn, false);
    }
  }

  // ── Verify ─────────────────────────────────────────────────────
  async function handleVerify(e) {
    e.preventDefault();
    const code = document.getElementById('verify-code').value.trim();
    if (!code || code.length < 6) { showAlert('Enter a valid 6-digit code.'); return; }

    try {
      await api.auth.confirm({ email: pendingEmail, code });
      showAlert('Email verified! You can now log in.', 'success');
      setTimeout(() => switchTab('login'), 1500);
    } catch (err) {
      showAlert(err.message || 'Invalid or expired code.');
    }
  }

  // ── Forgot Password ────────────────────────────────────────────
  async function handleForgotPassword(e) {
    e.preventDefault();
    const email = document.getElementById('forgot-email').value.trim();
    try {
      await api.auth.forgotPassword({ email });
      showAlert('Reset code sent! Check your email.', 'success');
    } catch (err) {
      showAlert('If this email is registered, a reset code has been sent.', 'info');
    }
  }

  async function resendCode() {
    if (!pendingEmail) return;
    Toast.info('Resending verification code...');
  }
</script>
</body>
</html>
