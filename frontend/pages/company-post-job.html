<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post Walk-in — Walk-in Interviews</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a class="navbar-brand" href="company-dashboard.html">🎯 <span>WalkIn</span>Hire</a>
    <div class="navbar-links">
      <a href="company-dashboard.html">Dashboard</a>
      <a href="company-post-job.html" class="active">Post Job</a>
    </div>
    <div class="navbar-user">
      <div class="navbar-avatar" id="nav-avatar">C</div>
      <span id="nav-username">Company</span>
      <button class="btn btn-ghost btn-sm" onclick="handleLogout()">Logout</button>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="container-md">
    <h1>Post a Walk-in Interview</h1>
    <p>Fill in the details and add time slots for candidates to book.</p>
  </div>
</div>

<div class="container-md" style="padding-bottom:48px">

  <div id="form-alert"></div>

  <form id="post-job-form" onsubmit="handleSubmit(event)">

    <!-- Job Details -->
    <div class="card mb-3">
      <h3 style="margin-bottom:20px">📋 Job Details</h3>

      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Role / Position <span>*</span></label>
          <input class="form-control" type="text" id="role-title"
                 placeholder="e.g. Software Engineer" required>
        </div>
        <div class="form-group">
          <label class="form-label">Package (LPA) <span>*</span></label>
          <input class="form-control" type="number" id="package-lpa"
                 placeholder="e.g. 8.5" step="0.1" min="0.5" required>
        </div>
      </div>

      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Min Experience (years)</label>
          <input class="form-control" type="number" id="exp-min"
                 value="0" min="0" step="0.5">
        </div>
        <div class="form-group">
          <label class="form-label">Max Experience (years)</label>
          <input class="form-control" type="number" id="exp-max"
                 placeholder="Optional" min="0" step="0.5">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Job Description <span>*</span></label>
        <textarea class="form-control" id="job-desc" rows="5"
                  placeholder="Describe the role, responsibilities, and ideal candidate..."
                  required></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Requirements</label>
        <textarea class="form-control" id="requirements" rows="3"
                  placeholder="Skills, qualifications, tools..."></textarea>
      </div>
    </div>

    <!-- Interview Details -->
    <div class="card mb-3">
      <h3 style="margin-bottom:20px">📅 Interview Details</h3>

      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Interview Date <span>*</span></label>
          <input class="form-control" type="date" id="interview-date" required>
        </div>
        <div class="form-group">
          <label class="form-label">Candidates Required <span>*</span></label>
          <input class="form-control" type="number" id="candidates-req"
                 placeholder="e.g. 50" min="1" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Venue Address</label>
        <textarea class="form-control" id="venue-address" rows="2"
                  placeholder="Full address of the interview venue"></textarea>
      </div>
    </div>

    <!-- Time Slots -->
    <div class="card mb-3">
      <div class="card-header">
        <h3>⏰ Time Slots</h3>
        <button type="button" class="btn btn-secondary btn-sm"
                onclick="addSlot()">+ Add Slot</button>
      </div>
      <p class="text-muted" style="margin-bottom:16px;font-size:0.875rem">
        Add time slots for candidates to choose from.
      </p>

      <div id="slots-container"></div>
    </div>

    <!-- Submit -->
    <div style="display:flex;gap:12px;justify-content:flex-end">
      <a href="company-dashboard.html" class="btn btn-ghost">Cancel</a>
      <button type="submit" class="btn btn-primary btn-lg" id="submit-btn">
        Post Walk-in Interview
      </button>
    </div>

  </form>
</div>

<div id="toast-container"></div>

<script src="../js/auth.js"></script>
<script src="../js/api.js"></script>
<script>
  Auth.requireRole('company');
  Auth.updateNavbar();

  // Set min date to tomorrow
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  document.getElementById('interview-date').min =
    tomorrow.toISOString().split('T')[0];

  // Slot management
  let slotCount = 0;

  function addSlot() {
    slotCount++;
    const id = `slot-${slotCount}`;
    const div = document.createElement('div');
    div.id        = id;
    div.className = 'card mb-2';
    div.style.cssText = 'padding:16px;background:var(--bg-secondary);position:relative';
    div.innerHTML = `
      <button type="button"
              onclick="removeSlot('${id}')"
              style="position:absolute;top:12px;right:12px;background:none;border:none;
                     font-size:1.2rem;cursor:pointer;color:var(--text-muted)">✕</button>
      <div class="grid-2" style="gap:12px;align-items:end">
        <div class="form-group" style="margin:0">
          <label class="form-label">Start Time <span>*</span></label>
          <input class="form-control slot-start" type="time" required>
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label">End Time <span>*</span></label>
          <input class="form-control slot-end" type="time" required>
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label">Capacity (candidates)</label>
          <input class="form-control slot-capacity" type="number"
                 value="10" min="1" max="500">
        </div>
      </div>`;
    document.getElementById('slots-container').appendChild(div);
  }

  function removeSlot(id) {
    document.getElementById(id)?.remove();
  }

  // Add first slot by default
  addSlot();

  // ── Submit ─────────────────────────────────────────────────────
  async function handleSubmit(e) {
    e.preventDefault();
    clearAlert();

    // Collect slots
    const slotCards = document.querySelectorAll('#slots-container .card');
    if (slotCards.length === 0) {
      showAlert('Please add at least one time slot.');
      return;
    }

    const slots = [];
    for (const card of slotCards) {
      const start    = card.querySelector('.slot-start').value;
      const end      = card.querySelector('.slot-end').value;
      const capacity = parseInt(card.querySelector('.slot-capacity').value) || 1;

      if (!start || !end) { showAlert('All slots need start and end times.'); return; }
      if (start >= end)   { showAlert('Slot end time must be after start time.'); return; }

      slots.push({ start_time: start, end_time: end, capacity });
    }

    const payload = {
      role_title:          document.getElementById('role-title').value.trim(),
      job_description:     document.getElementById('job-desc').value.trim(),
      requirements:        document.getElementById('requirements').value.trim(),
      package_lpa:         parseFloat(document.getElementById('package-lpa').value),
      experience_min_yrs:  parseFloat(document.getElementById('exp-min').value) || 0,
      experience_max_yrs:  document.getElementById('exp-max').value
                             ? parseFloat(document.getElementById('exp-max').value)
                             : undefined,
      interview_date:      document.getElementById('interview-date').value,
      venue_address:       document.getElementById('venue-address').value.trim(),
      candidates_required: parseInt(document.getElementById('candidates-req').value),
      slots,
    };

    const btn = document.getElementById('submit-btn');
    setLoading(btn, true, 'Posting...');

    try {
      await api.jobs.create(payload);
      Toast.success('Walk-in interview posted successfully!');
      setTimeout(() => window.location.href = 'company-dashboard.html', 1000);
    } catch (err) {
      showAlert(err.message || 'Failed to post job. Please try again.');
      setLoading(btn, false);
    }
  }

  function showAlert(msg, type = 'danger') {
    document.getElementById('form-alert').innerHTML =
      `<div class="alert alert-${type}">${msg}</div>`;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function clearAlert() {
    document.getElementById('form-alert').innerHTML = '';
  }

  async function handleLogout() {
    try { await api.auth.logout(); } catch (_) {}
    Auth.logout();
    window.location.href = '../pages/login.html';
  }
</script>
</body>
</html>
