name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_PUBLIC_IP }} >> ~/.ssh/known_hosts

      - name: Write env file
        run: |
          printf "FLASK_ENV=production\n" > /tmp/walkin.env
          printf "FLASK_SECRET_KEY=${{ secrets.FLASK_SECRET_KEY }}\n" >> /tmp/walkin.env
          printf "PORT=5000\n" >> /tmp/walkin.env
          printf "DB_HOST=${{ secrets.DB_HOST }}\n" >> /tmp/walkin.env
          printf "DB_PORT=3306\n" >> /tmp/walkin.env
          printf "DB_NAME=interview_platform\n" >> /tmp/walkin.env
          printf "DB_USER=${{ secrets.DB_USER }}\n" >> /tmp/walkin.env
          printf "DB_PASSWORD=${{ secrets.DB_PASSWORD }}\n" >> /tmp/walkin.env
          printf "COGNITO_USER_POOL_ID=${{ secrets.COGNITO_USER_POOL_ID }}\n" >> /tmp/walkin.env
          printf "COGNITO_APP_CLIENT_ID=${{ secrets.COGNITO_APP_CLIENT_ID }}\n" >> /tmp/walkin.env
          printf "COGNITO_REGION=us-east-1\n" >> /tmp/walkin.env
          printf "SES_SENDER_EMAIL=${{ secrets.SES_SENDER_EMAIL }}\n" >> /tmp/walkin.env
          printf "SES_REGION=us-east-1\n" >> /tmp/walkin.env
          printf "BEDROCK_REGION=us-east-1\n" >> /tmp/walkin.env
          printf "BEDROCK_MODEL_ID=amazon.titan-text-express-v1\n" >> /tmp/walkin.env
          printf "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}\n" >> /tmp/walkin.env
          printf "FRONTEND_URL=${{ secrets.S3_WEBSITE_URL }}\n" >> /tmp/walkin.env
          printf "AWS_REGION=us-east-1\n" >> /tmp/walkin.env
          printf "BOOKING_CODE_PREFIX=WI\n" >> /tmp/walkin.env

      - name: Copy env to EC2
        run: |
          scp -i ~/.ssh/deploy_key /tmp/walkin.env ubuntu@${{ secrets.EC2_PUBLIC_IP }}:/tmp/walkin.env

      - name: Copy deploy script to EC2
        run: |
          scp -i ~/.ssh/deploy_key scripts/deploy.sh ubuntu@${{ secrets.EC2_PUBLIC_IP }}:/tmp/deploy.sh

      - name: Run deploy script on EC2
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.EC2_PUBLIC_IP }} "chmod +x /tmp/deploy.sh && bash /tmp/deploy.sh"

      - name: Verify API Gateway
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.API_GATEWAY_URL }}/health)
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ] && echo "Deployed!" || exit 1