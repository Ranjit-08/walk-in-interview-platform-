# deploy-backend.yml
# Triggers on push to main branch (backend/ changes)
# Steps: Test → Build → SSH into EC2 → Pull & Restart

name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'

jobs:

  # ── Job 1: Run Tests ─────────────────────────────────────────────
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    services:
      # Spin up a MySQL container for integration tests
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE:      interview_platform_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Create test .env file
        working-directory: backend
        run: |
          cat > .env <<EOF
          FLASK_ENV=testing
          FLASK_SECRET_KEY=test-secret-key-for-ci
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_NAME=interview_platform_test
          DB_USER=root
          DB_PASSWORD=testpassword
          COGNITO_USER_POOL_ID=test-pool-id
          COGNITO_APP_CLIENT_ID=test-client-id
          COGNITO_REGION=us-east-1
          SES_SENDER_EMAIL=test@test.com
          SES_REGION=us-east-
          BEDROCK_REGION=us-east-1
          BEDROCK_MODEL_ID=anthropic.claude-3-sonnet-20240229-v1:0
          FRONTEND_URL=http://localhost:3000
          AWS_REGION=us-east-1
          BOOKING_CODE_PREFIX=WI
          EOF

      - name: Run database migrations for tests
        working-directory: backend
        run: |
          mysql -h 127.0.0.1 -u root -ptestpassword interview_platform_test \
            < migrations/schema.sql

      - name: Run tests with coverage
        working-directory: backend
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ── Job 2: Deploy to EC2 ─────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test           # Only deploy if tests pass
    if: github.ref == 'refs/heads/main'

    environment:
      name: production
      url: ${{ secrets.API_GATEWAY_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_PUBLIC_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2 via SSH
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ubuntu@${{ secrets.EC2_PUBLIC_IP }} \
              'bash -s' << 'ENDSSH'

            set -e
            echo "=== Starting deployment ==="

            # Pull latest code
            cd /app
            git fetch origin main
            git reset --hard origin/main

            # Install/update Python dependencies
            /app/venv/bin/pip install -r /app/backend/requirements.txt --quiet

            # Run any new DB migrations (safe — schema uses IF NOT EXISTS)
            # mysql -h $DB_HOST -u $DB_USER -p$DB_PASSWORD $DB_NAME < /app/backend/migrations/schema.sql

            # Restart the application via supervisor
            sudo supervisorctl restart walkin

            # Wait for app to come up
            sleep 5

            # Health check
            response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health)
            if [ "$response" != "200" ]; then
              echo "Health check failed! Response: $response"
              sudo supervisorctl status walkin
              exit 1
            fi

            echo "=== Deployment successful! Health check passed ==="
          ENDSSH

      - name: Verify deployment via API Gateway
        run: |
          sleep 10
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            ${{ secrets.API_GATEWAY_URL }}/health)
          echo "API Gateway health check response: $response"
          if [ "$response" != "200" ]; then
            echo "API Gateway health check failed!"
            exit 1
          fi
          echo "Deployment verified successfully!"

      - name: Notify on success
        if: success()
        run: |
          echo "Backend deployed successfully to EC2"
          echo "API URL: ${{ secrets.API_GATEWAY_URL }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Backend deployment FAILED"
          echo "Check logs at: https://console.aws.amazon.com/cloudwatch"