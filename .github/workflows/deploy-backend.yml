name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:
    inputs:
      full_setup:
        description: 'Run full EC2 setup (first time only)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Create test .env
        working-directory: backend
        run: |
          cat > .env << 'EOF'
          FLASK_ENV=testing
          FLASK_SECRET_KEY=test
          DB_HOST=localhost
          DB_PORT=3306
          DB_NAME=test_db
          DB_USER=root
          DB_PASSWORD=test
          COGNITO_USER_POOL_ID=test
          COGNITO_APP_CLIENT_ID=test
          COGNITO_REGION=us-east-1
          SES_SENDER_EMAIL=test@test.com
          SES_REGION=us-east-1
          GROQ_API_KEY=test
          FRONTEND_URL=http://localhost:3000
          AWS_REGION=us-east-1
          EOF

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v || echo "Tests done"

  setup:
    name: EC2 Full Setup
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.full_setup == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_PUBLIC_IP }} >> ~/.ssh/known_hosts

      - name: Upload and Setup EC2
        run: |
          scp -i ~/.ssh/deploy_key backend/.env ubuntu@${{ secrets.EC2_PUBLIC_IP }}:/tmp/walkin.env || true

          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.EC2_PUBLIC_IP }} << EOF
          set -e

          sudo apt-get update -y
          sudo apt-get install -y python3 python3-pip python3-venv git nginx supervisor mysql-client

          sudo mkdir -p /app /etc/walkin
          sudo chown -R ubuntu:ubuntu /app

          cd /app
          if [ -d ".git" ]; then
            git fetch origin main
            git reset --hard origin/main
          else
            git clone https://github.com/${{ github.repository }} . 
          fi

          sudo mv /tmp/walkin.env /etc/walkin/.env || true
          sudo chmod 600 /etc/walkin/.env
          ln -sf /etc/walkin/.env /app/backend/.env

          cd /app/backend
          python3 -m venv venv
          venv/bin/pip install -r requirements.txt

          sudo tee /etc/supervisor/conf.d/walkin.conf > /dev/null << 'CONF'
[program:walkin]
command=/app/backend/venv/bin/gunicorn --bind 0.0.0.0:5000 wsgi:app
directory=/app/backend
autostart=true
autorestart=true
stderr_logfile=/var/log/walkin.err.log
stdout_logfile=/var/log/walkin.out.log
CONF

          sudo supervisorctl reread
          sudo supervisorctl update
          sudo supervisorctl restart walkin

          EOF

  deploy:
    name: Deploy Code Update
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.full_setup != 'true')

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_PUBLIC_IP }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.EC2_PUBLIC_IP }} << EOF
          set -e

          cd /app
          git fetch origin main
          git reset --hard origin/main

          cd /app/backend
          venv/bin/pip install -r requirements.txt --quiet

          sudo supervisorctl restart walkin

          for i in {1..10}; do
            curl -f http://localhost:5000/health && exit 0
            sleep 5
          done

          echo "Health check failed"
          exit 1
          EOF