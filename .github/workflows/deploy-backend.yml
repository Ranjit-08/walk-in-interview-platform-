name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:
    inputs:
      full_setup:
        description: 'Run full EC2 setup (first time only)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Create test .env
        working-directory: backend
        run: |
          cat > .env << 'ENVEOF'
          FLASK_ENV=testing
          FLASK_SECRET_KEY=test-key
          DB_HOST=localhost
          DB_PORT=3306
          DB_NAME=test_db
          DB_USER=root
          DB_PASSWORD=test
          COGNITO_USER_POOL_ID=test
          COGNITO_APP_CLIENT_ID=test
          COGNITO_REGION=us-east-1
          SES_SENDER_EMAIL=test@test.com
          SES_REGION=us-east-1
          BEDROCK_REGION=us-east-1
          BEDROCK_MODEL_ID=amazon.titan-text-express-v1
          GROQ_API_KEY=test
          FRONTEND_URL=http://localhost:3000
          AWS_REGION=us-east-1
          BOOKING_CODE_PREFIX=WI
          ENVEOF

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v || echo "Tests done"

  setup:
    name: EC2 Full Setup
    runs-on: ubuntu-latest
    needs: test
    if: github.event.inputs.full_setup == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_PUBLIC_IP }} >> ~/.ssh/known_hosts

      - name: Write .env locally
        env:
          FLASK_SECRET_KEY: ${{ secrets.FLASK_SECRET_KEY }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          COGNITO_APP_CLIENT_ID: ${{ secrets.COGNITO_APP_CLIENT_ID }}
          SES_SENDER_EMAIL: ${{ secrets.SES_SENDER_EMAIL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          S3_WEBSITE_URL: ${{ secrets.S3_WEBSITE_URL }}
        run: |
          cat > /tmp/walkin.env << ENVEOF
          FLASK_ENV=production
          FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
          PORT=5000
          DB_HOST=${DB_HOST}
          DB_PORT=3306
          DB_NAME=interview_platform
          DB_USER=${DB_USER}
          DB_PASSWORD=${DB_PASSWORD}
          COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
          COGNITO_APP_CLIENT_ID=${COGNITO_APP_CLIENT_ID}
          COGNITO_REGION=us-east-1
          SES_SENDER_EMAIL=${SES_SENDER_EMAIL}
          SES_REGION=us-east-1
          BEDROCK_REGION=us-east-1
          BEDROCK_MODEL_ID=amazon.titan-text-express-v1
          GROQ_API_KEY=${GROQ_API_KEY}
          FRONTEND_URL=${S3_WEBSITE_URL}
          AWS_REGION=us-east-1
          BOOKING_CODE_PREFIX=WI
          ENVEOF
          echo "✅ .env written"

      - name: Copy .env to EC2
        run: |
          scp -i ~/.ssh/deploy_key /tmp/walkin.env \
            ubuntu@${{ secrets.EC2_PUBLIC_IP }}:/tmp/walkin.env

      - name: Full EC2 Setup
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.EC2_PUBLIC_IP }} << 'ENDSSH'
          set -e

          echo "=== Step 1: Install packages ==="
          sudo apt-get update -y
          sudo apt-get install -y \
            python3 python3-pip python3-venv \
            git curl nginx \
            pkg-config default-libmysqlclient-dev \
            gcc supervisor mysql-client openssl
          echo "Packages installed"

          echo "=== Step 2: Create directories ==="
          sudo mkdir -p /app
          sudo mkdir -p /etc/walkin
          sudo chown -R ubuntu:ubuntu /app

          echo "=== Step 3: Clone repo ==="
          cd /app
          if [ -d ".git" ]; then
            echo "Repo exists - pulling"
            git fetch origin main
            git reset --hard origin/main
          else
            git clone https://github.com/Ranjit-08/walk-in-interview-platform-.git .
          fi
          ls /app/backend/

          echo "=== Step 4: Setup .env ==="
          sudo mv /tmp/walkin.env /etc/walkin/.env
          sudo chmod 600 /etc/walkin/.env
          rm -f /app/backend/.env
          ln -sf /etc/walkin/.env /app/backend/.env
          ls -la /app/backend/.env

          echo "=== Step 5: Python venv ==="
          cd /app/backend
          python3 -m venv venv
          venv/bin/pip install --upgrade pip
          venv/bin/pip install -r requirements.txt
          echo "venv ready"

          echo "=== Step 6: Nginx ==="
          sudo tee /etc/nginx/sites-available/walkin > /dev/null << 'NGINXEOF'
server {
    listen 80;
    server_name _;
    client_max_body_size 10M;
    location /health {
        proxy_pass http://127.0.0.1:5000/health;
    }
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }
}
NGINXEOF
          sudo ln -sf /etc/nginx/sites-available/walkin /etc/nginx/sites-enabled/walkin
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo nginx -t && sudo systemctl restart nginx
          echo "Nginx ready"

          echo "=== Step 7: Supervisor ==="
          sudo tee /etc/supervisor/conf.d/walkin.conf > /dev/null << 'SUPEOF'
[program:walkin]
command=/app/backend/venv/bin/gunicorn --bind 0.0.0.0:5000 --workers 4 --timeout 120 wsgi:app
directory=/app/backend
user=ubuntu
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
stderr_logfile=/var/log/walkin.err.log
stdout_logfile=/var/log/walkin.out.log
environment=HOME="/home/ubuntu",USER="ubuntu"
SUPEOF
          sudo supervisorctl reread
          sudo supervisorctl update
          sudo supervisorctl start walkin || true
          sleep 3
          sudo supervisorctl status walkin

          echo "=== Step 8: Apply DB schema ==="
          mysql \
            -h ${{ secrets.DB_HOST }} \
            -u ${{ secrets.DB_USER }} \
            -p"${{ secrets.DB_PASSWORD }}" \
            interview_platform \
            < /app/backend/migrations/schema.sql
          echo "Schema applied"
          mysql \
            -h ${{ secrets.DB_HOST }} \
            -u ${{ secrets.DB_USER }} \
            -p"${{ secrets.DB_PASSWORD }}" \
            interview_platform \
            -e "SHOW TABLES;"

          echo "=== Setup Complete ==="
          ENDSSH

      - name: Health check
        run: |
          sleep 10
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            http://${{ secrets.EC2_PUBLIC_IP }}/health)
          echo "Health: $response"
          [ "$response" = "200" ] && echo "✅ App is live!" || exit 1

  deploy:
    name: Deploy Code Update
    runs-on: ubuntu-latest
    needs: test
    if: github.event.inputs.full_setup != 'true' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_PUBLIC_IP }} >> ~/.ssh/known_hosts

      - name: Write .env locally
        env:
          FLASK_SECRET_KEY: ${{ secrets.FLASK_SECRET_KEY }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          COGNITO_APP_CLIENT_ID: ${{ secrets.COGNITO_APP_CLIENT_ID }}
          SES_SENDER_EMAIL: ${{ secrets.SES_SENDER_EMAIL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          S3_WEBSITE_URL: ${{ secrets.S3_WEBSITE_URL }}
        run: |
          cat > /tmp/walkin.env << ENVEOF
          FLASK_ENV=production
          FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
          PORT=5000
          DB_HOST=${DB_HOST}
          DB_PORT=3306
          DB_NAME=interview_platform
          DB_USER=${DB_USER}
          DB_PASSWORD=${DB_PASSWORD}
          COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
          COGNITO_APP_CLIENT_ID=${COGNITO_APP_CLIENT_ID}
          COGNITO_REGION=us-east-1
          SES_SENDER_EMAIL=${SES_SENDER_EMAIL}
          SES_REGION=us-east-1
          BEDROCK_REGION=us-east-1
          BEDROCK_MODEL_ID=amazon.titan-text-express-v1
          GROQ_API_KEY=${GROQ_API_KEY}
          FRONTEND_URL=${S3_WEBSITE_URL}
          AWS_REGION=us-east-1
          BOOKING_CODE_PREFIX=WI
          ENVEOF

      - name: Check EC2 is ready
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.EC2_PUBLIC_IP }} << 'ENDSSH'
          if [ ! -d "/app/backend" ]; then
            echo "ERROR: Run full_setup=true first!"
            exit 1
          fi
          echo "EC2 ready"
          ENDSSH

      - name: Copy .env + Deploy
        run: |
          scp -i ~/.ssh/deploy_key /tmp/walkin.env \
            ubuntu@${{ secrets.EC2_PUBLIC_IP }}:/tmp/walkin.env

          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.EC2_PUBLIC_IP }} << 'ENDSSH'
          set -e

          echo "=== Update .env ==="
          sudo mkdir -p /etc/walkin
          sudo mv /tmp/walkin.env /etc/walkin/.env
          sudo chmod 600 /etc/walkin/.env
          rm -f /app/backend/.env
          ln -sf /etc/walkin/.env /app/backend/.env

          echo "=== Pull latest code ==="
          cd /app
          git fetch origin main
          git reset --hard origin/main
          rm -f /app/backend/.env
          ln -sf /etc/walkin/.env /app/backend/.env

          echo "=== Install dependencies ==="
          cd /app/backend
          venv/bin/pip install -r requirements.txt --quiet

          echo "=== Restart app ==="
          sudo supervisorctl restart walkin
          sleep 5

          response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health)
          [ "$response" = "200" ] && echo "✅ Health check passed!" || { tail -20 /var/log/walkin.err.log; exit 1; }
          ENDSSH

      - name: Verify API Gateway
        run: |
          sleep 10
          response=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.API_GATEWAY_URL }}/health)
          [ "$response" = "200" ] && echo "✅ Deployed!" || exit 1
