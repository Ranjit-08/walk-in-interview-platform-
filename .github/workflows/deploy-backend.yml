name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_PUBLIC_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2 (Auto Setup + Deploy)
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.EC2_PUBLIC_IP }} << EOF
          set -e

          echo "=== Step 1: Ensure base setup ==="
          sudo apt-get update -y
          sudo apt-get install -y python3 python3-pip python3-venv git nginx supervisor

          sudo mkdir -p /app
          sudo chown -R ubuntu:ubuntu /app

          echo "=== Step 2: Clone or update repo ==="
          cd /app
          if [ -d ".git" ]; then
            git fetch origin main
            git reset --hard origin/main
          else
            git clone https://github.com/${{ github.repository }} .
          fi

          echo "=== Step 3: Setup backend ==="
          cd /app/backend

          if [ ! -d "venv" ]; then
            python3 -m venv venv
          fi

          venv/bin/pip install --upgrade pip
          venv/bin/pip install -r requirements.txt

          echo "=== Step 4: Configure Supervisor ==="
          sudo tee /etc/supervisor/conf.d/walkin.conf > /dev/null << 'CONF'
[program:walkin]
command=/app/backend/venv/bin/gunicorn --bind 0.0.0.0:5000 --workers 3 wsgi:app
directory=/app/backend
user=ubuntu
autostart=true
autorestart=true
stderr_logfile=/var/log/walkin.err.log
stdout_logfile=/var/log/walkin.out.log
CONF

          sudo supervisorctl reread
          sudo supervisorctl update
          sudo supervisorctl restart walkin || true

          echo "=== Step 5: Health check ==="
          for i in {1..10}; do
            if curl -f http://localhost:5000/health; then
              echo "✅ Backend is live"
              exit 0
            fi
            sleep 5
          done

          echo "❌ Deployment failed"
          exit 1
          EOF