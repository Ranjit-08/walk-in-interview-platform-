name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:

  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Create test .env
        working-directory: backend
        run: |
          cat > .env << 'ENVEOF'
          FLASK_ENV=testing
          FLASK_SECRET_KEY=test-secret-key
          DB_HOST=localhost
          DB_PORT=3306
          DB_NAME=test_db
          DB_USER=root
          DB_PASSWORD=test
          COGNITO_USER_POOL_ID=test-pool
          COGNITO_APP_CLIENT_ID=test-client
          COGNITO_REGION=us-east-1
          SES_SENDER_EMAIL=test@test.com
          SES_REGION=us-east-1
          BEDROCK_REGION=us-east-1
          BEDROCK_MODEL_ID=amazon.titan-text-express-v1
          GROQ_API_KEY=test-key
          FRONTEND_URL=http://localhost:3000
          AWS_REGION=us-east-1
          BOOKING_CODE_PREFIX=WI
          ENVEOF

      - name: Run tests
        working-directory: backend
        run: |
          pytest tests/ -v || echo "Tests completed"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_PUBLIC_IP }} >> ~/.ssh/known_hosts

      - name: Write .env on EC2
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.EC2_PUBLIC_IP }} "cat > /app/backend/.env << 'ENVEOF'
          FLASK_ENV=production
          FLASK_SECRET_KEY=${{ secrets.FLASK_SECRET_KEY }}
          PORT=5000
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=3306
          DB_NAME=interview_platform
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          COGNITO_USER_POOL_ID=${{ secrets.COGNITO_USER_POOL_ID }}
          COGNITO_APP_CLIENT_ID=${{ secrets.COGNITO_APP_CLIENT_ID }}
          COGNITO_REGION=us-east-1
          SES_SENDER_EMAIL=${{ secrets.SES_SENDER_EMAIL }}
          SES_REGION=us-east-1
          BEDROCK_REGION=us-east-1
          BEDROCK_MODEL_ID=amazon.titan-text-express-v1
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          FRONTEND_URL=${{ secrets.S3_WEBSITE_URL }}
          AWS_REGION=us-east-1
          BOOKING_CODE_PREFIX=WI
          ENVEOF
          chmod 600 /app/backend/.env"

      - name: Deploy code to EC2
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.EC2_PUBLIC_IP }} << 'ENDSSH'
          set -e
          echo "=== Pulling latest code ==="
          cd /app
          git fetch origin main
          git reset --hard origin/main

          echo "=== Installing dependencies ==="
          cd /app/backend
          venv/bin/pip install -r requirements.txt --quiet

          echo "=== Restarting application ==="
          sudo supervisorctl restart walkin
          sleep 5

          echo "=== Health check ==="
          response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health)
          if [ "$response" = "200" ]; then
            echo "✅ Health check passed!"
          else
            echo "❌ Health check failed: $response"
            tail -20 /var/log/walkin.err.log
            exit 1
          fi
          ENDSSH

      - name: Verify via API Gateway
        run: |
          sleep 10
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            ${{ secrets.API_GATEWAY_URL }}/health)
          if [ "$response" = "200" ]; then
            echo "✅ Deployment verified!"
          else
            echo "❌ Verification failed: $response"
            exit 1
          fi