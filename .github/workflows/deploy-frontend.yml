name: Deploy Frontend to S3

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  validate:
    name: Validate Frontend Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check files exist
        run: |
          for f in \
            "frontend/index.html" \
            "frontend/pages/login.html" \
            "frontend/pages/user-dashboard.html" \
            "frontend/pages/browse-jobs.html" \
            "frontend/pages/book-slot.html" \
            "frontend/pages/company-dashboard.html" \
            "frontend/pages/company-post-job.html" \
            "frontend/pages/mock-interview.html" \
            "frontend/js/api.js" \
            "frontend/js/auth.js" \
            "frontend/css/main.css" \
            "frontend/css/auth.css" \
            "frontend/css/dashboard.css" \
            "frontend/css/interview.css"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exit 1
            fi
            echo "OK: $f"
          done

      - name: Check API_BASE configured
        run: |
          if grep -q "your-api-gateway-url" frontend/js/api.js; then
            echo "ERROR: api.js has placeholder URL"
            exit 1
          fi
          grep "API_BASE" frontend/js/api.js

  deploy:
    name: Upload to S3
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Inject API Gateway URL
        run: |
          sed -i "s|https://your-api-gateway-url.execute-api.ap-south-1.amazonaws.com/prod|${{ secrets.API_GATEWAY_URL }}|g" frontend/js/api.js
          grep "API_BASE" frontend/js/api.js

      - name: Sync to S3
        run: |
          aws s3 sync frontend/ s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --delete \
            --exclude "*.DS_Store" \
            --exclude ".git/*"
          echo "Synced to S3"

      - name: Fix content types
        run: |
          aws s3 cp s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --metadata-directive REPLACE \
            --content-type "text/html; charset=utf-8" \
            --cache-control "no-cache"

      - name: Verify
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.S3_WEBSITE_URL }}/index.html)
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ] && echo "Deployed!" || exit 1

      - name: Summary
        if: success()
        run: |
          echo "URL: ${{ secrets.S3_WEBSITE_URL }}"
          echo "API: ${{ secrets.API_GATEWAY_URL }}"
          echo "Commit: ${{ github.sha }}"
